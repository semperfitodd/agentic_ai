name: Arc Agent
options:
  bundleIdPrefix: com.bernsonfamily.com
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  Arc Agent:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    supportedDestinations: [iOS, iPadOS]
    sources:
      - path: Arc Agent
        excludes:
          - "Secrets.swift.example"
          - "Arc Agent.entitlements"
    resources:
      - path: Arc Agent/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bernsonfamily.com.Arc-Agent
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Arc Agent/Arc Agent.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: NO

  Arc AgentTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Arc AgentTests
    dependencies:
      - target: Arc Agent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bernsonfamily.com.Arc-AgentTests
        GENERATE_INFOPLIST_FILE: YES

  Arc AgentUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Arc AgentUITests
    dependencies:
      - target: Arc Agent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bernsonfamily.com.Arc-AgentUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Arc Agent:
    build:
      targets:
        Arc Agent: all
        Arc AgentTests: [test]
        Arc AgentUITests: [test]
    test:
      targets:
        - Arc AgentTests
        - Arc AgentUITests
    run:
      config: Debug
    archive:
      config: Release
