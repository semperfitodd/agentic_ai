name: Backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  NPM_VERSION: '11'
  ENVIRONMENT: agentic_ai_demo

jobs:
  # ── 1. Detect which backend directories changed ──────────────────────────
  detect-changes:
    name: Detect changed lambdas
    runs-on: ubuntu-latest
    outputs:
      shared_changed: ${{ steps.filter.outputs.shared }}
      lambdas: ${{ steps.matrix.outputs.lambdas }}
      any_lambda: ${{ steps.matrix.outputs.any_lambda }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'backend/shared/**'
            aggregate_sprint:
              - 'backend/aggregate_sprint/**'
            analyze_pr:
              - 'backend/analyze_pr/**'
            authorizer:
              - 'backend/authorizer/**'
            fetch_pr_details:
              - 'backend/fetch_pr_details/**'
            fetch_repo_data:
              - 'backend/fetch_repo_data/**'
            get_markdown:
              - 'backend/get_markdown/**'
            get_results:
              - 'backend/get_results/**'
            parse_repos:
              - 'backend/parse_repos/**'
            prepare_data:
              - 'backend/prepare_data/**'
            store_results:
              - 'backend/store_results/**'
            workflow_proxy:
              - 'backend/workflow_proxy/**'

      - name: Build lambda matrix
        id: matrix
        run: |
          ALL_LAMBDAS='["aggregate_sprint","analyze_pr","authorizer","fetch_pr_details","fetch_repo_data","get_markdown","get_results","parse_repos","prepare_data","store_results","workflow_proxy"]'

          # If shared changed, deploy all lambdas; otherwise only changed ones
          if [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            LAMBDAS="$ALL_LAMBDAS"
          else
            CHANGED='[]'
            for name in aggregate_sprint analyze_pr authorizer fetch_pr_details fetch_repo_data get_markdown get_results parse_repos prepare_data store_results workflow_proxy; do
              if [ "$(echo '${{ toJSON(steps.filter.outputs) }}' | jq -r --arg n "$name" '.[$n]')" = "true" ]; then
                CHANGED=$(echo "$CHANGED" | jq -c --arg n "$name" '. + [$n]')
              fi
            done
            LAMBDAS="$CHANGED"
          fi

          # Ensure compact single-line JSON for $GITHUB_OUTPUT
          LAMBDAS=$(echo "$LAMBDAS" | jq -c '.')

          echo "lambdas=$LAMBDAS" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$LAMBDAS" | jq 'length')
          echo "any_lambda=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ── 2. Build the shared library ──────────────────────────────────────────
  build-shared:
    name: Build shared
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_lambda == 'true' || needs.detect-changes.outputs.shared_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/shared/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install & build shared library
        working-directory: backend/shared
        run: npm ci && npm run build

      - name: Cache shared dist
        uses: actions/cache/save@v4
        with:
          path: |
            backend/shared/dist
            backend/shared/node_modules
          key: backend-shared-${{ github.sha }}

  # ── 3. Test changed lambdas in parallel ──────────────────────────────────
  test:
    name: Test ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build-shared]
    if: needs.detect-changes.outputs.any_lambda == 'true'

    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJSON(needs.detect-changes.outputs.lambdas) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/${{ matrix.lambda }}/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Restore shared dist
        uses: actions/cache/restore@v4
        with:
          path: |
            backend/shared/dist
            backend/shared/node_modules
          key: backend-shared-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install & test
        working-directory: backend/${{ matrix.lambda }}
        run: npm ci && npm test -- --passWithNoTests

  # ── 4. Deploy changed lambdas on push to main ────────────────────────────
  deploy:
    name: Deploy ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.any_lambda == 'true'
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJSON(needs.detect-changes.outputs.lambdas) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/${{ matrix.lambda }}/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Restore shared dist
        uses: actions/cache/restore@v4
        with:
          path: |
            backend/shared/dist
            backend/shared/node_modules
          key: backend-shared-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build & deploy ${{ matrix.lambda }}
        working-directory: backend/${{ matrix.lambda }}
        env:
          FN_NAME: ${{ env.ENVIRONMENT }}_${{ matrix.lambda }}
        run: |
          npm ci && npm run build
          zip -r function.zip dist node_modules index.js package.json
          aws lambda update-function-code \
            --function-name "$FN_NAME" \
            --zip-file fileb://function.zip \
            --publish
          echo "Deployed $FN_NAME"
