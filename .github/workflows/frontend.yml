name: Frontend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'static_site/**'
      - '.github/workflows/frontend.yml'
  push:
    branches:
      - main
    paths:
      - 'static_site/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: static_site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: static_site/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --ci

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: static_site/build/
          retention-days: 1

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: static_site/build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync static_site/build/ s3://${{ vars.SITE_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "asset-manifest.json"

      - name: Sync entry-point files (no cache)
        run: |
          aws s3 sync static_site/build/ s3://${{ vars.SITE_BUCKET }}/ \
            --cache-control "public,max-age=0,must-revalidate" \
            --include "index.html" \
            --include "asset-manifest.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
